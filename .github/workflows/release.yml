name: Build & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PyInstaller and Project
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Extract Metadata
        id: meta
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*[\"\']([^\"\']+)[\"\']', open('sifapedal/__init__.py', encoding='utf-8').read()).group(1))")
          AUTHOR=$(python -c "import re; print(re.search(r'authors\s*=\s*\[\{\s*name\s*=\s*[\"\']([^\"\']+)[\"\']', open('pyproject.toml', encoding='utf-8').read()).group(1))")
          NAME=$(python -c "import re; print(re.search(r'^name\s*=\s*[\"\']([^\"\']+)[\"\']', open('pyproject.toml', encoding='utf-8').read(), re.MULTILINE).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Build executable
        run: pyinstaller --onefile --windowed --name SifaPedal sifapedal/__main__.py

      - name: Prepare Portable Executable
        shell: bash
        run: |
          cp dist/SifaPedal.exe dist/SifaPedal-${{ steps.meta.outputs.version }}-portable.exe

      - name: Build Installer
        run: iscc /DMyAppName="${{ steps.meta.outputs.name }}" /DMyAppVersion="${{ steps.meta.outputs.version }}" /DMyAppPublisher="${{ steps.meta.outputs.author }}" packaging\windows\installer.iss

      - name: Rename Installer
        shell: bash
        run: |
          cd packaging/windows/Output
          mv SifaPedal-windows-setup.exe SifaPedal-${{ steps.meta.outputs.version }}-setup.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          draft: true
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          files: |
            dist/SifaPedal-*-portable.exe
            packaging/windows/Output/SifaPedal-*-setup.exe
